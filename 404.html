<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | ProFreza24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
  <script>
    (function(){
      var d = location.pathname.split('/').filter(Boolean).length - 1;
      var b = d > 0 ? '../'.repeat(d) : '';
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = b + 'css/style.css';
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>

<div id="app-header"></div>

<!-- 404 CONTENT -->
<section class="section">
  <div class="container">
    <div class="empty-state">
      <span class="material-icons" style="font-size:80px;">search_off</span>
      <h1 class="h2" style="margin-top:var(--sp-4);">Страница не найдена</h1>
      <p class="body1" style="color:var(--on-surface-2);margin-top:var(--sp-2);max-width:480px;margin-left:auto;margin-right:auto;">Запрашиваемая страница не существует или была перемещена.</p>
      <a id="homeLink" href="#" class="btn btn--primary btn--lg btn--round" style="margin-top:var(--sp-6);">
        <span class="material-icons icon-sm">home</span> На главную
      </a>
    </div>
  </div>
</section>

<div id="app-footer"></div>

<script src="js/templates.js"></script>
<script src="js/main.js"></script>
<script>
  initApp('');
  document.getElementById('homeLink').href = p('index.html');
</script>
</body>
</html>
